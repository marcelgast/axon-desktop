# Axon Desktop — production compose.
#
# Uses the combined server image (FastAPI + Next.js + Redis + Nginx)
# built from the axon repo and published to ghcr.io on every release.
# All services run inside a single container on port 3000.

volumes:
  axon-data:   # SQLite + Redis persistence

services:
  axon:
    image: ghcr.io/marcelgast/axon:latest
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY must be set}
      - AXON_DEPLOY_MODE=desktop
    volumes:
      - axon-data:/data
    restart: unless-stopped
