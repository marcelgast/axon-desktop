# Axon Desktop — production compose.
# Images are pulled from GitHub Container Registry on first launch.
# Data is persisted in named Docker volumes so it survives restarts.

networks:
  axon-internal:
    driver: bridge
    internal: true   # agent containers have no external internet access
  axon-external:
    driver: bridge   # master + dashboard only

volumes:
  axon-db:
  axon-redis:

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - axon-redis:/data
    networks:
      - axon-internal
    restart: unless-stopped

  master:
    image: ghcr.io/marcelgast/axon-master:latest
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/axon.db
      - REDIS_URL=redis://redis:6379
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - FRONTEND_URLS=http://localhost:3000,http://127.0.0.1:3000
      - LOG_LEVEL=INFO
    volumes:
      - axon-db:/app/data
    depends_on:
      - redis
    networks:
      - axon-internal
      - axon-external
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  dashboard:
    image: ghcr.io/marcelgast/axon-dashboard:latest
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      master:
        condition: service_healthy
    networks:
      - axon-external
    restart: unless-stopped
